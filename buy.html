<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Checkout - Pet Shop</title>
    <link rel="canonical" href="checkout.html">
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            if (!params.has('buyNow')) params.set('buyNow', '1');
            var target = 'checkout.html' + (params.toString() ? '?' + params.toString() : '');
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>Redirecting to checkout… <a href="checkout.html">Click here</a> if you are not redirected.</p>
</body>
</html>
