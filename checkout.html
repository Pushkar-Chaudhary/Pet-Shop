<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your pet purchase with secure checkout. Fast delivery and multiple payment options available.">
    <meta name="keywords" content="pet shop checkout, buy pets online, pet delivery, secure payment">
    <meta name="author" content="Pet Shop">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Checkout - Pet Shop</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">Pet Shop 🐾</a>
        <div class="cart-btn">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>

    <div class="container">
        <h1 class="section-title">Checkout</h1>

        <div class="checkout-container">
            <!-- CART ITEMS -->
            <div class="checkout-section">
                <h2>Your Cart</h2>
                <div id="cartItems" class="cart-items">
                    <!-- Cart items will be populated here -->
                </div>
                <div class="cart-total">
                    <strong>Subtotal: रू<span id="subtotal">0</span></strong>
                </div>
            </div>

            <!-- DISCOUNT CODE -->
            <div class="checkout-section">
                <h2>Discount Code</h2>
                <div class="discount-section">
                    <input type="text" id="discountCode" placeholder="Enter discount code" class="discount-input">
                    <button id="applyDiscount" class="btn-discount">Apply</button>
                </div>
                <div id="discountMessage" class="discount-message"></div>
            </div>

            <!-- DELIVERY ADDRESS -->
            <div class="checkout-section">
                <h2>Delivery Address</h2>
                <form id="addressForm" class="address-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" name="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <textarea id="address" name="address" rows="3" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="state">State *</label>
                            <input type="text" id="state" name="state" required>
                        </div>
                        <div class="form-group">
                            <label for="pincode">Pincode *</label>
                            <input type="text" id="pincode" name="pincode" required>
                        </div>
                    </div>
                </form>
            </div>

            <!-- PAYMENT METHOD -->
            <div class="checkout-section">
                <h2>Payment Method</h2>
                <div class="payment-methods">
                    <div class="payment-option">
                        <input type="radio" id="card" name="paymentMethod" value="card" checked>
                        <label for="card">
                            <i class="fas fa-credit-card"></i>
                            Credit/Debit Card
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="upi" name="paymentMethod" value="upi">
                        <label for="upi">
                            <i class="fas fa-mobile-alt"></i>
                            UPI
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="netbanking" name="paymentMethod" value="netbanking">
                        <label for="netbanking">
                            <i class="fas fa-university"></i>
                            Net Banking
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="cod" name="paymentMethod" value="cod">
                        <label for="cod">
                            <i class="fas fa-money-bill-wave"></i>
                            Cash on Delivery
                        </label>
                    </div>
                </div>

                <!-- Card Details (shown when card is selected) -->
                <div id="cardDetails" class="card-details">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cardNumber">Card Number *</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456">
                        </div>
                        <div class="form-group">
                            <label for="expiry">Expiry Date *</label>
                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cvv">CVV *</label>
                            <input type="text" id="cvv" name="cvv" placeholder="123">
                        </div>
                        <div class="form-group">
                            <label for="cardName">Name on Card *</label>
                            <input type="text" id="cardName" name="cardName" placeholder="John Doe">
                        </div>
                    </div>
                </div>

                <!-- UPI Details (shown when UPI is selected) -->
                <div id="upiDetails" class="upi-details" style="display: none;">
                    <div class="form-group">
                        <label for="upiId">UPI ID *</label>
                        <input type="text" id="upiId" name="upiId" placeholder="yourname@upi">
                    </div>
                </div>
            </div>

            <!-- ORDER SUMMARY -->
            <div class="checkout-section order-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>रू<span id="summarySubtotal">0</span></span>
                </div>
                <div class="summary-row">
                    <span>Delivery:</span>
                    <span>रू<span id="deliveryCharge">100</span></span>
                </div>
                <div class="summary-row" id="discountRow" style="display: none;">
                    <span>Discount:</span>
                    <span>-रू<span id="discountAmount">0</span></span>
                </div>
                <div class="summary-row total-row">
                    <strong>Total:</strong>
                    <strong>रू<span id="finalTotal">0</span></strong>
                </div>
            </div>

            <!-- PLACE ORDER BUTTON -->
            <div class="checkout-actions">
                <button id="placeOrder" class="btn-place-order">Place Order</button>
                <a href="index.html" class="btn-continue-shopping">Continue Shopping</a>
            </div>
        </div>
    </div>

    <!-- EmailJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <!-- LINK TO JS -->
    <script src="checkout.js"></script>

</body>
</html>
