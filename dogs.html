<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dogs - Pet Shop</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body data-product-filter="dog">
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">Pet Shoppe</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="cats.html">Cats</a>
        <a href="dogs.html">Dogs</a>
        <a href="pet-food.html">Pet Food</a>
        <a href="accessories.html">Accessories</a>
      </nav>
      <div class="header-controls">
        <a href="login.html?next=checkout.html" class="link-btn" id="authLoginLink">Login / Sign Up</a>
        <div class="auth-user-menu" id="authUserMenu" style="display: none;">
          <span class="auth-user-name" id="authUserName"></span>
          <a href="checkout.html" class="link-btn">Checkout</a>
          <button type="button" class="link-btn link-btn-muted" id="authLogoutBtn">Logout</button>
        </div>
        <a href="index.html" class="cart-toggle-btn" aria-label="View cart">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>
  <main class="container" style="padding: 2rem 1rem 4rem;">
    <h1 class="section-title">Dogs</h1>
    <p class="subtle" style="text-align:center; max-width:700px; margin:-1rem auto 2rem;">Friendly companions and active playmates for every home.</p>
    <section class="animalstopurchase"></section>
  </main>
  <div class="toast-container" id="toastContainer"></div>
  <script src="auth.js"></script>
  <script src="products.js"></script>
  <script src="shop.js"></script>
</body>
</html>
