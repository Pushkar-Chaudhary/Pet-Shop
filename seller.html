<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pet Shop Seller Dashboard - Manage your products">
    <meta name="keywords" content="pet shop, seller, dashboard, manage products">
    <meta name="author" content="Pet Shop">
    <meta name="robots" content="noindex, nofollow">
    <title>Seller Dashboard - Pet Shop</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link rel="stylesheet" href="styles.css">
    <style>
        .seller-dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .seller-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .seller-header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .seller-header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .product-form, .product-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .product-list h3 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: box-shadow 0.3s ease;
        }

        .product-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-info {
            flex: 1;
        }

        .product-info h4 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .product-info p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .product-price {
            font-weight: 600;
            color: #667eea;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-edit {
            background: #28a745;
            color: white;
        }

        .btn-edit:hover {
            background: #218838;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .btn-submit {
            width: 100%;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .image-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .image-upload input[type="file"] {
            display: none;
        }

        .image-upload label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 120px;
            border: 2px dashed #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .image-upload label:hover {
            border-color: #667eea;
        }

        .image-upload label i {
            font-size: 2rem;
            color: #999;
            margin-right: 10px;
        }

        .image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .seller-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">Pet Shop 🐾</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

    <!-- LOGIN FORM (shown when not logged in) -->
    <div class="login-form" id="loginForm">
        <h2>Seller Login</h2>
        <form id="loginFormEl">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>
    </div>

    <!-- DASHBOARD (shown when logged in) -->
    <div class="seller-dashboard" id="dashboard" style="display: none;">
        <div class="seller-header">
            <h1>Seller Dashboard</h1>
            <p>Manage your products and grow your business</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Products</h3>
                <div class="number" id="totalProducts">0</div>
            </div>
            <div class="stat-card">
                <h3>Pets</h3>
                <div class="number" id="totalPets">0</div>
            </div>
            <div class="stat-card">
                <h3>Accessories</h3>
                <div class="number" id="totalAccessories">0</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- ADD/EDIT PRODUCT FORM -->
            <div class="product-form">
                <h3><i class="fas fa-plus-circle"></i> Add/Edit Product</h3>
                <form id="productForm">
                    <input type="hidden" id="productId">

                    <div class="form-group">
                        <label for="productName">Product Name *</label>
                        <input type="text" id="productName" required>
                    </div>

                    <div class="form-group">
                        <label for="productPrice">Price (रू) *</label>
                        <input type="number" id="productPrice" min="1" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="productCategory">Category *</label>
                        <select id="productCategory" required>
                            <option value="">Select Category</option>
                            <option value="pet">Pet</option>
                            <option value="accessory">Accessory</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="productDescription">Description *</label>
                        <textarea id="productDescription" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="productImage">Product Image</label>
                        <div class="image-upload">
                            <input type="file" id="productImage" accept="image/*">
                            <label for="productImage">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Click to upload image</span>
                            </label>
                        </div>
                        <img id="imagePreview" class="image-preview" style="display: none;" alt="Preview">
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </form>
            </div>

            <!-- PRODUCT LIST -->
            <div class="product-list">
                <h3><i class="fas fa-list"></i> Your Products</h3>
                <div id="productList">
                    <p>No products added yet. Add your first product!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="seller.js"></script>
</body>
</html>
